name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Set up XVFB
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run check/tests
        run: |
          xvfb-run --auto-servernum npm run check
